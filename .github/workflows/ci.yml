name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-22.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/sourcerer-ui/src-tauri

      - name: Install Linux build deps (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Setup Node + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/sourcerer-ui/pnpm-lock.yaml

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (workspace, -D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: xtask i18n-lint
        run: cargo run -p xtask -- i18n-lint

      - name: Install cargo-deny
        # `EmbarkStudios/cargo-deny-action@v2` is a Docker container
        # action — `Container action is only supported on Linux` on
        # macOS / Windows runners. License + advisory checks are OS-
        # agnostic, so one Linux run covers the workspace.
        if: runner.os == 'Linux'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

      - name: Install pnpm deps
        working-directory: apps/sourcerer-ui
        run: pnpm install --frozen-lockfile=false

      - name: tauri build (debug, current OS only)
        working-directory: apps/sourcerer-ui
        run: pnpm tauri build --debug

      - name: Phase 2 smoke — FSEvents subscriber (macOS only)
        if: runner.os == 'macOS'
        run: bash tests/smoke/phase_02_journal_mac.sh
