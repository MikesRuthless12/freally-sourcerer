name: release

# Tag-triggered cross-platform release. Push a `v*` tag (or run manually with a
# tag input) and tauri-action builds the installers on each OS and uploads them
# to a GitHub release. The release is created as a DRAFT — verify all artifacts,
# then publish it (gh release edit <tag> --draft=false).
#
# Installers carry FREE ed25519/minisign UPDATER signatures (TAURI_SIGNING_*
# secrets) so the auto-updater can verify downloads, and tauri-action uploads
# latest.json alongside them. Distribution signing is still absent: no
# Apple/Windows code-signing certs, so macOS users see a Gatekeeper warning and
# Windows users see SmartScreen until paid certs are wired into this step's env.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build/publish (e.g. v0.19.84)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.label }})
    strategy:
      fail-fast: false
      # One leg at a time: tauri-action has each leg read-merge-write the shared
      # latest.json, so parallel legs race on that upload ("ReleaseAsset
      # already_exists") and one platform gets dropped from the manifest.
      # Serializing the legs serializes the latest.json update. Releases are
      # infrequent, so the extra wall-clock is worth a complete manifest.
      max-parallel: 1
      matrix:
        # Native build per OS/arch — Win (MSI+NSIS), macOS arm64 + Intel,
        # Linux (deb/rpm/AppImage). The macOS Intel build cross-compiles on the
        # Apple Silicon runner (macos-14) instead of the chronically-scarce
        # macos-13 runner, which failed to deliver the Intel .dmg for v0.20.0.
        include:
          - { platform: windows-latest, label: windows-x86_64, args: "", rust-target: "" }
          - { platform: macos-14, label: macos-aarch64, args: "", rust-target: "" }
          - { platform: macos-14, label: macos-x86_64, args: "--target x86_64-apple-darwin", rust-target: "x86_64-apple-darwin" }
          - { platform: ubuntu-22.04, label: linux-x86_64, args: "", rust-target: "" }
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add cross-compile target to the pinned toolchain (macOS Intel)
        if: matrix.rust-target != ''
        # The build obeys rust-toolchain.toml (channel 1.94.0), NOT the `stable`
        # toolchain dtolnay installs — so adding the target to `stable` leaves
        # the build with "target x86_64-apple-darwin is not installed". Read the
        # pinned channel from the toml (sed works on macOS/BSD) and install THAT
        # toolchain with the cross target.
        run: |
          channel=$(sed -n 's/^channel *= *"\(.*\)"/\1/p' rust-toolchain.toml)
          echo "pinned channel: $channel ; adding target ${{ matrix.rust-target }}"
          rustup toolchain install "$channel" --target ${{ matrix.rust-target }} --no-self-update
          rustup target list --toolchain "$channel" --installed | grep "${{ matrix.rust-target }}"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/freally-ui/src-tauri

      - name: Install Linux build deps (ubuntu only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/freally-ui/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/freally-ui
        run: pnpm install --frozen-lockfile=false

      # The release notes the in-app updater shows. Pulled from the changelog
      # section for this exact tag, and the build FAILS if there is no such
      # section — a silently-empty `notes` field means every user sees a blank
      # "an update is available" dialog, which looks broken and is easy to miss
      # because nothing errors.
      #
      # The version is matched as a literal prefix, never as a regex: `0.20.1`
      # inside `## \[0.20.1\]` collapses to a character class where `.` is a
      # wildcard, so the pattern matches nothing and the notes come out empty.
      #
      # `awk` trims the leading/trailing blank lines itself rather than piping
      # through `tac`, which does not exist on the macOS runners.
      - name: Extract release notes from the changelog
        id: notes
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          NOTES="$(awk -v ver="$VERSION" '
            BEGIN { needle = "## [" ver "]"; inside = 0; n = 0 }
            index($0, needle) == 1 { inside = 1; next }
            inside && substr($0, 1, 3) == "## " { exit }
            inside { lines[n++] = $0 }
            END {
              s = 0;     while (s < n  && lines[s] ~ /^[[:space:]]*$/) s++
              e = n - 1; while (e >= s && lines[e] ~ /^[[:space:]]*$/) e--
              # Sections are closed by a `---` rule before the next heading.
              # Left in place it renders as a stray divider at the bottom of
              # every release note and every update dialog.
              while (e >= s && lines[e] ~ /^[[:space:]]*---[[:space:]]*$/) {
                e--
                while (e >= s && lines[e] ~ /^[[:space:]]*$/) e--
              }
              for (i = s; i <= e; i++) print lines[i]
            }
          ' docs/CHANGELOG.md)"

          if [ -z "$NOTES" ]; then
            echo "::error::docs/CHANGELOG.md has no '## [$VERSION]' section; refusing to ship empty release notes"
            exit 1
          fi

          # latest.json is fetched on every launch — keep the manifest small.
          NOTES="${NOTES:0:8000}"
          echo "extracted ${#NOTES} characters of release notes for $VERSION"

          {
            echo "body<<__FREALLY_NOTES__"
            printf '%s\n' "$NOTES"
            echo "__FREALLY_NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Build app + upload to draft release (updater-signed)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free ed25519/minisign updater signing. The private key + its
          # password are repo secrets; tauri bundles the .sig files and
          # tauri-action emits/uploads latest.json for the updater.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/freally-ui
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Freally ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          # Emit + upload latest.json (the updater manifest the app polls).
          includeUpdaterJson: true
          # We bundle BOTH `wix` (.msi) and `nsis` (setup.exe). tauri-action
          # defaults this to false, which puts the **MSI** behind the
          # `windows-x86_64` key that the updater actually reads. The site hands
          # people `x64-setup.exe`, so a typical install is NSIS — and an MSI run
          # over an NSIS install has a different product code, so it installs a
          # *second* copy beside the first instead of upgrading it. The running
          # executable is never replaced. Ship the installer our users have.
          updaterJsonPreferNsis: true
          # Per-leg build args — the macOS Intel leg passes
          # `--target x86_64-apple-darwin` to cross-compile on the arm64 runner;
          # tauri-action names its bundles per-arch and merges each platform into
          # the release's latest.json.
          args: ${{ matrix.args }}
