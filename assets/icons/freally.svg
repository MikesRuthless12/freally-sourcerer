<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Freally</title>
  <desc>Centered baby-blue magnifying glass on a dark canvas. Same icon family as voidtools' Everything; baby blue (#89CFF0) instead of cyan.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#1A2230"/>
      <stop offset="100%" stop-color="#0E1116"/>
    </radialGradient>

    <linearGradient id="blueBevel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8E8F8"/>
      <stop offset="55%" stop-color="#89CFF0"/>
      <stop offset="100%" stop-color="#5FA8CD"/>
    </linearGradient>

    <radialGradient id="lensGlass" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#1F2630"/>
      <stop offset="60%" stop-color="#161B22"/>
      <stop offset="100%" stop-color="#0E1116"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square dark canvas -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bgGlow)"/>

  <!-- Magnifying-glass handle (centered alignment, lens-to-corner diagonal) -->
  <line x1="700" y1="700" x2="880" y2="880"
        stroke="url(#blueBevel)" stroke-width="110" stroke-linecap="round"/>
  <line x1="708" y1="694" x2="868" y2="854"
        stroke="#E0F2FB" stroke-width="22" stroke-linecap="round" opacity="0.55"/>

  <!-- Lens — centered with the whole-mark mass roughly in the middle -->
  <circle cx="468" cy="468" r="280" fill="none"
          stroke="url(#blueBevel)" stroke-width="84"/>
  <circle cx="468" cy="468" r="238" fill="url(#lensGlass)"/>
  <circle cx="468" cy="468" r="238" fill="none"
          stroke="#E0F2FB" stroke-width="3" opacity="0.35"/>

  <!-- Lens reflection highlight (top-left arc) -->
  <path d="M 286,418 A 234,234 0 0,1 416,288"
        stroke="#FFFFFF" stroke-width="20" stroke-linecap="round"
        fill="none" opacity="0.5"/>
  <!-- Subtler secondary highlight -->
  <path d="M 290,538 A 230,230 0 0,1 280,470"
        stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"
        fill="none" opacity="0.18"/>
</svg>
