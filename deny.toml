# cargo-deny configuration for Sourcerer.
# Enforces Mike Weaver's license policy: permissive only, AGPL hard-banned.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    # bzip2-1.0.6 is a 4-clause-style permissive license used by libbz2-rs-sys
    # (transitive via the `bzip2` feature on the `zip` crate + sevenz-rust2).
    # FSF lists it as a free, GPL-compatible license; required for archive-peek
    # to enumerate `.tar.bz2` and bzip2-compressed zip / 7z entries.
    "bzip2-1.0.6",
    # Project license (Mike Weaver — All Rights Reserved). Applies to in-tree crates
    # only; cargo-deny treats it as an opaque LicenseRef and never propagates it.
    "LicenseRef-MikeWeaver-Proprietary-AllRightsReserved",
]
# Hard-banned licenses. AGPL is the headline ban; SSPL/BUSL/CC-BY-NC/CC-BY-SA also blocked
# per the Build Guide. cargo-deny rejects anything not on the `allow` list above, so this
# section is documentation-of-intent rather than functional.
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
